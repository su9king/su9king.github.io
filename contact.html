layout: page
title: Contact Me
description: 해당 파트 제작중입니다.
background: '/img/bg-contact.jpg'
form: true
---

<p>해당 파트 제작중입니다. 감사합니다.</p>
<form name="sentMessage" id="contactForm" novalidate>
  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Name: 준비중입니다.</label>
      <input type="text" class="form-control" placeholder="현재 준비중입니다." id="name" required data-validation-required-message="Please enter your name.">
      <p class="help-block text-danger"></p>
    </div>
  </div>
  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Email Address: 준비중입니다.</label>
      <input type="email" class="form-control" placeholder="현재 준비중입니다." id="email" required data-validation-required-message="Please enter your email address.">
      <p class="help-block text-danger"></p>
    </div>
  </div>
  <div class="control-group">
    <div class="form-group col-xs-12 floating-label-form-group controls">
      <label>Phone Number: 준비중입니다.</label>
      <input type="tel" class="form-control" placeholder="현재 준비중입니다." id="phone" required data-validation-required-message="Please enter your phone number.">
      <p class="help-block text-danger"></p>
    </div>
  </div>
  <div class="control-group">
    <div class="form-group floating-label-form-group controls">
      <label>Message: 준비중입니다.</label>
      <textarea rows="5" class="form-control" placeholder="현재 준비중입니다." id="message" required data-validation-required-message="Please enter a message."></textarea>
      <p class="help-block text-danger"></p>
    </div>
  </div>
  <br>
  <div id="success"></div>
  <div class="form-group">
    <button type="submit" class="btn btn-primary" id="sendMessageButton">Send</button>
  </div>
</form>
